<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — Gestion freelance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-body">
  <main class="login-card">
    <h1>📚 Gestion freelance</h1>
    <p class="muted">Accès réservé. Veuillez saisir votre mot de passe.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" class="stacked">
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" name="password" id="password" autofocus required>
      </div>
      <button class="btn" type="submit" style="width:100%">Se connecter</button>
    </form>
  </main>
</body>
</html>
